name: savewise
description: Personal Finance Companion App
publish_to: "none"
version: 1.0.0+1
 
environment:
  sdk: ">=3.0.0 <4.0.0"
 
dependencies:
  flutter:
    sdk: flutter
 
  # BLoC state management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5
 
  # Local persistence
  shared_preferences: ^2.3.2
 
  # Charts
  fl_chart: ^0.69.0
 
  # Icons
  cupertino_icons: ^1.0.8
 
  # UUID for transaction IDs
  uuid: ^4.4.2
 
  # File system access for CSV export
  path_provider: ^2.1.5
  share_plus: ^11.0.0
  cross_file: ^0.3.4       # iOS fallback: share sheet so user can save to Files
  permission_handler: ^11.3.1
 
  # Intl for date/number formatting
  intl: ^0.19.0
 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
 
flutter:
  uses-material-design: true